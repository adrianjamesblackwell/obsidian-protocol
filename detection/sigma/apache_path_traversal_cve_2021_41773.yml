title: Apache HTTP Server Path Traversal / RCE Exploitation Attempt (CVE-2021-41773 / CVE-2021-42013)
id: 7f2c8e4a-3b91-4e2d-9a7c-1d5e6f8a9b3c
status: stable
description: |
    Detects path traversal and RCE attempts against Apache HTTP
    Server 2.4.49/2.4.50. Looks for encoded "../" sequences used
    through ScriptAlias paths (e.g. /cgi-bin/). This works because
    the path normalization function fails to correctly reject
    URL-encoded traversal characters.

    This rule also includes real IOC patterns shared in the FBI/CISA
    Androxgh0st advisory (AA24-016A): in the real world, this CVE is
    actively scanned for by a botnet that harvests Laravel .env
    files.
references:
    - https://httpd.apache.org/security/CVE-2021-41773.html
    - https://httpd.apache.org/security/CVE-2021-42013.html
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-016a
author: obsidian-protocol-warden
date: 2026/06/27
logsource:
    category: webserver
    product: apache
detection:
    # Stage A: classic path traversal attempt — encoded ../ sequences
    # combined with a ScriptAlias path (/cgi-bin/)
    selection_traversal:
        cs_uri_stem|contains: '/cgi-bin/'
        cs_uri_query|contains:
            - '%2e%2e/'
            - '%2e%2e%2f'
            - '%%32%65%%32%65%%32%66'   # double-encoded ../ (the exact pattern CVE-2021-42013 bypasses)
            - '..%2f'
            - '..%c0%af'                 # alternative UTF-8 overlong encoding

    # Stage B: escalation to RCE — the traversal path is pointed at a
    # shell interpreter (the pattern seen in real exploit PoCs)
    selection_rce:
        cs_method: 'POST'
        cs_uri_stem|contains: '/cgi-bin/'
        cs_uri_stem|contains:
            - '/bin/sh'
            - '/bin/bash'

    # Stage C: Androxgh0st botnet IOCs (from FBI/CISA AA24-016A —
    # real-world parallel patterns scanned for alongside this CVE)
    selection_androxgh0st:
        cs_uri_stem|contains:
            - '/.env'
            - '/vendor/phpunit/phpunit/src/Util/PHP/eval-stdin.php'
        cs_referrer|contains: 'androxgh0st'

    condition: 1 of selection_*
falsepositives:
    - Legitimate CGI script usage (rare; mod_cgi is typically disabled in modern environments)
    - Security scanning tools (Qualys QID 150372-150374, Nessus) generate similar requests during their own scans
level: critical
tags:
    - attack.initial_access
    - attack.t1190          # Exploit Public-Facing Application
    - cve.2021-41773
    - cve.2021-42013
