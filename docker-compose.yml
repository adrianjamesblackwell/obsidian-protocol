version: "3.8"

# ============================================================
# OBSIDIAN PROTOCOL — ISOLATED RANGE DEFINITION
#
# ISOLATION GUARANTEE:
#   - "obsidian-range" is defined as internal:true -> no container
#     on this network can reach the internet or any other network
#     on the host.
#   - target-49 does not expose any port externally (it's only
#     reachable from inside the range). If you want host access for
#     manual testing, uncomment the "ports" line below — but only do
#     this on your own isolated machine / VM.
# ============================================================

networks:
  obsidian-range:
    internal: true   # <-- CRITICAL: without this, the container could reach the internet
    driver: bridge

services:
  # TARGET-49 — the target system VECTOR-I/II are run against
  # (Apache 2.4.49 + the vulnerable polkit version exploited by PwnKit)
  target-49:
    build:
      context: ./docker/target-49
    container_name: obsidian-target-49
    hostname: target-49
    networks:
      - obsidian-range
    # ports:
    #   - "8080:80"   # Optional, for manual testing from the host only
    cap_add:
      - AUDIT_CONTROL   # required so auditd can monitor VECTOR-II's syscalls
      - AUDIT_WRITE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  # OPERATOR — the box the attack chain is executed from
  operator:
    build:
      context: ./docker/operator
    container_name: obsidian-operator
    hostname: operator
    networks:
      - obsidian-range
    tty: true
    stdin_open: true
    depends_on:
      target-49:
        condition: service_healthy
    volumes:
      - ./reports:/opt/obsidian/reports
      - ./detection:/opt/obsidian/detection
      - ./scripts:/opt/obsidian/scripts
    restart: "no"
