# ============================================================
# OBSIDIAN PROTOCOL / VECTOR-I
# Configuration required to trigger CVE-2021-41773 / CVE-2021-42013.
# These settings are DELIBERATELY insecure.
#
# In the real world, this vulnerability arose from a regression in
# Apache 2.4.49/2.4.50's path normalization logic: encoded "../"
# sequences (%2e%2e/) were not being correctly rejected.
# ============================================================

<Directory "/usr/local/apache2/htdocs">
    # require all denied -> require all granted (in the real world,
    # some administrators loosen this "just to make it work," which
    # is one of the actual root causes behind this CVE escalating
    # from path traversal to RCE)
    Require all granted
</Directory>

<Directory "/usr/local/apache2/cgi-bin">
    Options +ExecCGI
    AddHandler cgi-script .sh .cgi .pl
    Require all granted
</Directory>

ScriptAlias /cgi-bin/ "/usr/local/apache2/cgi-bin/"
LoadModule cgi_module modules/mod_cgi.so
