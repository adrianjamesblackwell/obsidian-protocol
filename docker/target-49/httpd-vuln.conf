# ============================================================
# OBSIDIAN PROTOCOL / VECTOR-I
# CVE-2021-41773 / CVE-2021-42013'ün tetiklenmesi için gereken
# konfigürasyon. Bu ayarlar BİLEREK güvensizdir.
#
# Gerçek dünyada bu zafiyet, Apache 2.4.49/2.4.50'de path
# normalization mantığındaki bir regresyon yüzünden ortaya çıktı:
# "../" dizilerinin encode edilmiş hallerinin (%2e%2e/) doğru
# reddedilmemesi.
# ============================================================

<Directory "/usr/local/apache2/htdocs">
    # require all denied -> require all granted (gerçek dünyada
    # bazı sistem yöneticileri "çalışsın diye" bunu gevşetir,
    # bu da CVE'nin path traversal'dan RCE'ye sıçramasının
    # gerçek nedenlerinden biri)
    Require all granted
</Directory>

<Directory "/usr/local/apache2/cgi-bin">
    Options +ExecCGI
    AddHandler cgi-script .sh .cgi .pl
    Require all granted
</Directory>

ScriptAlias /cgi-bin/ "/usr/local/apache2/cgi-bin/"
LoadModule cgi_module modules/mod_cgi.so
